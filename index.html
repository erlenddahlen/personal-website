<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Erlend Evenstad Dahlen</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="header-inner">
            <a href="index.html" class="site-title">Erlend Evenstad Dahlen</a>
            <nav class="nav-links">
                <a href="https://github.com/erlenddahlen" target="_blank" rel="noopener">GitHub</a>
                <a href="https://linkedin.com/in/" target="_blank" rel="noopener">LinkedIn</a>
                <a href="mailto:erlende3@gmail.com">Email</a>
            </nav>
        </div>
    </header>
    <main>
        <section class="intro">
            <p>Welcome to my blog. I write about software development, technology, and things I find interesting.</p>
        </section>
        <section class="posts" id="posts">
            <h2>Posts</h2>
            <div id="post-list"></div>
        </section>
    </main>
    <script>
        fetch('posts/posts.json')
            .then(res => res.json())
            .then(posts => {
                const list = document.getElementById('post-list');
                if (posts.length === 0) {
                    list.innerHTML = '<p class="empty">No posts yet.</p>';
                    return;
                }
                posts.forEach(post => {
                    const article = document.createElement('article');
                    article.className = 'post-card';
                    article.innerHTML = `
                        <a href="post.html?slug=${post.slug}">
                            <time>${post.date}</time>
                            <h3>${post.title}</h3>
                            <p>${post.description}</p>
                        </a>
                    `;
                    list.appendChild(article);
                });
            });
    </script>
</body>
</html>
